name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true
      - name: Quality gate
        run: scripts/quality-gate.sh
      - name: Download checksum-pinned free-threaded CPython fixture
        env:
          PYFT_RUNTIME_URL: https://github.com/astral-sh/python-build-standalone/releases/download/20260718/cpython-3.14.6%2B20260718-x86_64-unknown-linux-gnu-freethreaded-install_only.tar.gz
          PYFT_RUNTIME_SHA256: 3b4e09857ebeb16617ef8064f433a2255bc3cd357891f92b888a3752126582bb
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 "$PYFT_RUNTIME_URL" --output "$RUNNER_TEMP/python.tar.gz"
          printf '%s  %s\n' "$PYFT_RUNTIME_SHA256" "$RUNNER_TEMP/python.tar.gz" | sha256sum --check --strict
          mkdir "$RUNNER_TEMP/python-runtime"
          tar -xzf "$RUNNER_TEMP/python.tar.gz" -C "$RUNNER_TEMP/python-runtime"
      - name: Real fixture and Action exit propagation
        env:
          PYFT_TEST_PYTHON: ${{ runner.temp }}/python-runtime/python/bin/python3.14t
        run: scripts/quality-gate.sh
